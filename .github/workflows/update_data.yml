name: Update FRED Data

on:
  schedule:
    # Her gece 01:00 UTC (Turkiye 04:00) calisir
    - cron: '0 1 * * *'
  workflow_dispatch:  # Manuel de tetiklenebilir (GitHub UI'dan)

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo'yu checkout et
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bagimlilik yukle
        run: pip install pandas requests

      - name: Veriyi guncelle
        run: python updater.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Degisiklikleri commit et ve push et
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: FRED verisi guncellendi - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
